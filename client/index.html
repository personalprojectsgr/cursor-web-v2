<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#181818" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Cursor Web</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@vscode/codicons@0.0.36/dist/codicon.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
  <link rel="stylesheet" href="css/cursor-theme.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-icon"><span class="codicon codicon-remote"></span></div>
      <h1 class="auth-title">Cursor Web</h1>
      <p class="auth-subtitle">Connect to your IDE remotely</p>
      <form id="auth-form" class="auth-form">
        <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />
        <button type="submit" id="auth-btn">Connect</button>
      </form>
      <p id="auth-error" class="auth-error"></p>
    </div>
  </div>

  <div id="main-screen" class="main-screen hidden">

    <div id="sidebar">
      <div id="sidebar-window-sections"></div>
      <button id="sidebar-new-chat" class="sidebar-new-chat-btn" type="button">+ New Chat</button>
    </div>

    <div id="main-content">

      <div id="machine-bar" class="machine-bar hidden">
        <div id="machine-list" class="machine-list"></div>
        <button id="btn-add-machine" class="btn-icon" title="Add machine">
          <span class="codicon codicon-add"></span>
        </button>
      </div>

      <div id="tab-bar" class="tab-bar hidden">
        <div id="tab-list" class="tab-list"></div>
        <button id="btn-new-chat" class="btn-icon" title="New chat">
          <span class="codicon codicon-add"></span>
        </button>
      </div>

      <header id="header" class="header">
        <div class="header-left">
          <span id="connection-dot" class="connection-dot"></span>
          <span id="chat-title" class="chat-title">Cursor</span>
        </div>
        <div class="header-right">
          <span id="agent-status" class="agent-status"></span>
        </div>
      </header>

      <div id="messages" class="messages-container">
        <div id="empty-state" class="empty-state">
          <span class="codicon codicon-comment-discussion empty-icon"></span>
          <p id="empty-state-text">Waiting for Cursor IDE...</p>
          <p class="empty-hint">Start Cursor with <code>--remote-debugging-port=9222</code></p>
        </div>
      </div>

      <div id="toolbar-area" class="toolbar-area hidden">
        <div class="toolbar-left">
          <span id="toolbar-files" class="toolbar-files"></span>
        </div>
        <div class="toolbar-right">
          <button id="toolbar-stop" class="toolbar-btn hidden">Stop<span class="toolbar-shortcut">Ctrl+Shift+⌫</span></button>
          <button id="toolbar-review" class="toolbar-btn toolbar-btn-primary hidden">Review</button>
        </div>
      </div>

      <div id="input-area" class="input-area">
        <div class="input-box">
          <div id="image-preview-strip" class="image-preview-strip hidden"></div>
          <div id="input-editor" class="input-editor" contenteditable="true" role="textbox" data-placeholder="Add a follow-up"></div>
          <div class="input-box-bottom">
            <div class="input-bottom-left">
              <button id="pill-mode" class="pill">
                <span id="pill-mode-text">Agent</span>
              </button>
              <button id="pill-model" class="pill pill-model">
                <span id="pill-model-text">Auto</span>
              </button>
            </div>
            <div class="input-bottom-right">
              <button id="btn-attach" class="btn-icon" title="Attach image">
                <span class="codicon codicon-attach"></span>
              </button>
              <button id="btn-send" class="btn-send" title="Send (Enter)">
                <span class="codicon codicon-send"></span>
              </button>
              <button id="btn-stop" class="btn-stop hidden" title="Stop generation">
                <span class="codicon codicon-debug-stop"></span>
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="machine-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Add Machine</h2>
        <button id="machine-modal-close" class="btn-icon"><span class="codicon codicon-close"></span></button>
      </div>
      <form id="machine-form" class="modal-form">
        <label>Display Name</label>
        <input type="text" id="machine-name" placeholder="My Desktop" />
        <label>Host / IP</label>
        <input type="text" id="machine-host" placeholder="192.168.1.50" required />
        <label>Port</label>
        <input type="number" id="machine-port" value="9222" />
        <div class="modal-actions">
          <button type="button" id="machine-test" class="btn-secondary">Test Connection</button>
          <button type="submit" class="btn-primary">Add Machine</button>
        </div>
        <p id="machine-test-result" class="test-result"></p>
      </form>
    </div>
  </div>

  <div id="sheet-overlay" class="sheet-overlay hidden"></div>
  <div id="sheet-mode" class="sheet hidden">
    <div class="sheet-header">Mode</div>
    <div id="sheet-mode-list" class="sheet-list"></div>
  </div>
  <div id="sheet-model" class="sheet hidden">
    <div class="sheet-header">Model</div>
    <div id="sheet-model-list" class="sheet-list"></div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/state.js"></script>
  <script src="js/messages.js"></script>
  <script src="js/input.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
