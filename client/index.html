<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>CursorRemote</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            border: 'hsl(240 3.7% 15.9%)',
            input: 'hsl(240 3.7% 15.9%)',
            ring: 'hsl(240 4.9% 83.9%)',
            background: 'hsl(240 10% 3.9%)',
            foreground: 'hsl(0 0% 98%)',
            primary: { DEFAULT: 'hsl(0 0% 98%)', foreground: 'hsl(240 5.9% 10%)' },
            secondary: { DEFAULT: 'hsl(240 3.7% 15.9%)', foreground: 'hsl(0 0% 98%)' },
            destructive: { DEFAULT: 'hsl(0 62.8% 30.6%)', foreground: 'hsl(0 0% 98%)' },
            muted: { DEFAULT: 'hsl(240 3.7% 15.9%)', foreground: 'hsl(240 5% 64.9%)' },
            accent: { DEFAULT: 'hsl(240 3.7% 15.9%)', foreground: 'hsl(0 0% 98%)' },
            card: { DEFAULT: 'hsl(240 10% 3.9%)', foreground: 'hsl(0 0% 98%)' },
          },
          borderRadius: { lg: '0.5rem', md: 'calc(0.5rem - 2px)', sm: 'calc(0.5rem - 4px)' },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="bg-background text-foreground min-h-screen flex flex-col antialiased">

  <div id="auth-screen" class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-sm space-y-6">
      <div class="text-center space-y-2">
        <div class="mx-auto w-12 h-12 rounded-xl bg-secondary flex items-center justify-center">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-foreground">
            <polyline points="16 18 22 12 16 6" /><polyline points="8 6 2 12 8 18" />
          </svg>
        </div>
        <h1 class="text-2xl font-semibold tracking-tight">CursorRemote</h1>
        <p class="text-sm text-muted-foreground">Connect to your Cursor IDE</p>
      </div>
      <form id="auth-form" class="space-y-4">
        <input
          type="password"
          id="auth-password"
          placeholder="Password"
          autocomplete="current-password"
          required
          class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 focus:ring-offset-background"
        />
        <button
          type="submit"
          id="auth-btn"
          class="inline-flex h-10 w-full items-center justify-center rounded-md bg-primary text-primary-foreground text-sm font-medium transition-colors hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-ring disabled:opacity-50 disabled:pointer-events-none"
        >Connect</button>
      </form>
      <p id="auth-error" class="text-sm text-destructive text-center"></p>
    </div>
  </div>

  <div id="main-screen" class="flex-1 flex flex-col hidden">

    <header class="flex items-center justify-between px-4 h-12 border-b border-border shrink-0">
      <div class="flex items-center gap-2">
        <span id="connection-dot" class="w-2 h-2 rounded-full bg-destructive"></span>
        <span id="connection-text" class="text-xs text-muted-foreground">Connecting...</span>
      </div>
      <div id="agent-status" class="flex items-center gap-1.5 text-xs text-muted-foreground hidden">
        <span id="agent-status-icon"></span>
        <span id="agent-status-text">Idle</span>
      </div>
    </header>

    <div id="window-bar" class="hidden border-b border-border px-2 py-1.5 overflow-x-auto">
      <div id="window-list" class="flex gap-1"></div>
    </div>

    <div id="tab-bar" class="hidden border-b border-border px-2 py-1.5 overflow-x-auto">
      <div class="flex items-center gap-1">
        <div id="tab-list" class="flex gap-1"></div>
        <button id="btn-new-chat" type="button" class="shrink-0 w-7 h-7 rounded-md flex items-center justify-center text-muted-foreground hover:bg-secondary hover:text-foreground transition-colors text-sm">+</button>
      </div>
    </div>

    <div id="messages" class="flex-1 overflow-y-auto px-4 py-3 space-y-3">
      <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center space-y-2">
        <p id="empty-state-primary" class="text-sm text-muted-foreground">Connecting to relay...</p>
        <p id="empty-state-hint" class="text-xs text-muted-foreground/60">Checking connection state.</p>
      </div>
    </div>

    <div id="approval-bar" class="hidden border-t border-border px-4 py-2 flex items-center justify-between gap-2 bg-card">
      <span id="approval-desc" class="text-xs text-muted-foreground truncate flex-1"></span>
      <div class="flex gap-2 shrink-0">
        <button id="btn-approve" type="button" class="h-8 px-3 rounded-md bg-emerald-600 text-white text-xs font-medium hover:bg-emerald-700 transition-colors">Accept</button>
        <button id="btn-reject" type="button" class="h-8 px-3 rounded-md bg-destructive text-white text-xs font-medium hover:bg-destructive/80 transition-colors">Reject</button>
      </div>
    </div>

    <div id="input-area" class="border-t border-border px-3 py-2 bg-card shrink-0">
      <div id="image-preview-strip" class="hidden flex gap-2 mb-2 overflow-x-auto pb-1"></div>
      <div class="flex items-end gap-2">
        <button id="btn-attach" type="button" class="shrink-0 w-9 h-9 rounded-md flex items-center justify-center text-muted-foreground hover:text-foreground hover:bg-secondary transition-colors" aria-label="Attach image">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <textarea
          id="message-input"
          placeholder="Send a message..."
          rows="1"
          class="flex-1 min-h-[36px] max-h-[120px] resize-none rounded-md border border-input bg-background px-3 py-2 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-1 focus:ring-ring"
        ></textarea>
        <button id="btn-send" type="button" disabled class="shrink-0 w-9 h-9 rounded-md bg-primary text-primary-foreground flex items-center justify-center disabled:opacity-30 hover:bg-primary/90 transition-colors">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
        <button id="btn-stop" type="button" class="shrink-0 w-9 h-9 rounded-md bg-destructive text-white flex items-center justify-center hover:bg-destructive/80 transition-colors hidden">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        </button>
      </div>
    </div>

  </div>

  <div id="toast-container" class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 items-center pointer-events-none"></div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/state.js"></script>
  <script src="js/messages.js"></script>
  <script src="js/input.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
